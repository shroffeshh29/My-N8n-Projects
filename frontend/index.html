<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Test Case Generator</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      max-width: 800px;
      margin: 40px auto;
      padding: 0 20px;
      background: #0f1117;
      color: #e6e6e6;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
    }

    p.sub {
      color: #9a9a9a;
      margin-top: -8px;
    }

    textarea {
      width: 100%;
      min-height: 140px;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1d27;
      color: #e6e6e6;
      font-size: 14px;
      resize: vertical;
    }

    input[type="text"] {
      width: 100%;
      padding: 10px 12px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1d27;
      color: #e6e6e6;
      font-size: 14px;
      margin-bottom: 12px;
    }

    button {
      margin-top: 12px;
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      background: #4f7cff;
      color: white;
      font-size: 14px;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .card {
      margin-top: 14px;
      padding: 14px 16px;
      border-radius: 8px;
      border: 1px solid #2a2d3a;
      background: #161923;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 999px;
      margin-right: 6px;
    }

    .positive {
      background: #1e3a2b;
      color: #7fd99a;
    }

    .negative {
      background: #3a1e1e;
      color: #d97f7f;
    }

    .edge {
      background: #3a341e;
      color: #d9c47f;
    }

    ol {
      padding-left: 18px;
      margin: 8px 0;
    }

    #status {
      color: #9a9a9a;
      font-size: 13px;
      margin-top: 8px;
    }

    #error {
      color: #d97f7f;
      font-size: 13px;
      margin-top: 8px;
    }
  </style>
</head>

<body>
  <h1>AI test case generator</h1>
  <p class="sub">Paste a user story. Groq (via n8n) returns structured positive, negative, and edge-case test cases.</p>

  <input type="text" id="ticketId" placeholder="Ticket ID (optional, e.g. JIRA-123)" />
  <textarea id="userStory"
    placeholder="As a user, I want to reset my password via email so that I can regain access to my account if I forget it."></textarea>
  <br />
  <button id="generateBtn" onclick="generate()">Generate test cases</button>
  <div id="status"></div>
  <div id="error"></div>
  <div id="results"></div>

  <script>
    // INSTRUCTION: Replace with your deployed n8n webhook URL.
    // Do NOT commit credentials or API keys into this file.
    // Use environment variables or a secure config file outside version control.
    // Example: https://your-n8n-instance.up.railway.app/webhook/generate-test-cases
    const N8N_WEBHOOK_URL = "http://localhost:5678/webhook/generate-test-cases"; // <-- UPDATE THIS

    async function generate() {
      const userStory = document.getElementById("userStory").value.trim();
      const ticketId = document.getElementById("ticketId").value.trim();
      const btn = document.getElementById("generateBtn");
      const status = document.getElementById("status");
      const error = document.getElementById("error");
      const results = document.getElementById("results");

      error.textContent = "";
      results.innerHTML = "";

      if (!userStory) {
        error.textContent = "Please enter a user story.";
        return;
      }

      btn.disabled = true;
      status.textContent = "Generating test cases... (usually 3-6s on Groq)";

      try {
        const res = await fetch(N8N_WEBHOOK_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ userStory, ticketId })
        });

        if (!res.ok) throw new Error(`Server returned ${res.status}`);
        const data = await res.json();

        if (!data.testCases || data.testCases.length === 0) {
          error.textContent = "No test cases returned. Check the n8n workflow logs.";
          status.textContent = "";
          btn.disabled = false;
          return;
        }

        status.textContent = `${data.testCases.length} test cases generated for ${data.ticketId || "this story"}.`;
        results.innerHTML = data.testCases.map(tc => `
          <div class="card">
            <span class="badge ${tc.type}">${tc.type}</span>
            <span class="badge" style="background:#2a2d3a;color:#c0c0c0">${tc.priority}</span>
            <strong>${tc.id}: ${tc.title}</strong>
            <ol>${tc.steps.map(s => `<li>${s}</li>`).join("")}</ol>
            <div><em>Expected:</em> ${tc.expectedResult}</div>
          </div>
        `).join("");
      } catch (err) {
        error.textContent = "Error: " + err.message;
        status.textContent = "";
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>

</html>
